<!DOCTYPE html>
<html>
<head>
    <title>The Joke Box</title>
    <style>
        body {
            /* Bright yellow background */
            background-color: #ffeb3b; 
            /* Monospace font gives it that retro, blocky pixel text look */
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            margin-top: 150px;
            color: #000000;
        }

        /* The text area where the joke appears */
        .joke-text {
            font-size: 1.5rem;
            font-weight: bold;
            max-width: 600px;
            margin: 0 auto 40px auto;
            min-height: 60px;
            line-height: 1.4;
        }

        /* Simple white button with black pixel text */
        .pixel-btn {
            background-color: #ffffff;
            color: #000000;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 30px;
            border: 4px solid #000000; /* Thick black border for a retro look */
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000; /* Pixel-style block shadow */
        }

        /* Makes the button look like it physically pushes down */
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
    </style>
</head>
<body>

    <div class="joke-text" id="box">Click the button below if you want to laugh. Or cringe.</div>

    <button class="pixel-btn" onclick="throwJoke()">throw a joke</button>

    <script>
        // A list of simple, text-only jokes
        const list = [
            "Why do programmers wear glasses? Because they can't C#.",
            "What do you call a fake noodle? An impasta.",
            "Why did the scarecrow win an award? Because he was outstanding in his field.",
            "Why don't scientists trust atoms? Because they make up everything.",
            "I told my doctor that I broke my arm in two places. He told me to stop going to those places.",
            "What do you call a sleeping dinosaur? A dino-snore."
        ];

        function throwJoke() {
            // Pick a random position number from our list length
            let randomNum = Math.floor(Math.random() * list.length);
            
            // Display the random joke inside our text box container
            document.getElementById('box').innerText = list[randomNum];
        }
    </script>

</body>
</html>
