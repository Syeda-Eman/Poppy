<!DOCTYPE html>
<html>
<head>
    <title>Throw a joke!</title>
    <style>
        body {
       
            background-color: #ffeb3b; 
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            margin-top: 150px;
            color: #000000;
        }


        .joke-text {
            font-size: 1.5rem;
            font-weight: bold;
            max-width: 600px;
            margin: 0 auto 40px auto;
            min-height: 60px;
            line-height: 1.4;
        }


        .pixel-btn {
            background-color: #ffffff;
            color: #000000;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 30px;
            border: 4px solid #000000; 
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000; 
        }


        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
    </style>
</head>
<body>

    <div class="joke-text" id="box">Click the button below if you want to laugh.</div>

    <button class="pixel-btn" onclick="throwJoke()">Throw a joke</button>

    <script>
        
        const list = [
            "Why do programmers wear glasses? Because they can't C#.",
            "What do you call a fake noodle? An impasta.",
            "Why did the scarecrow win an award? Because he was outstanding in his field.",
            "Why don't scientists trust atoms? Because they make up everything.",
            "I told my doctor that I broke my arm in two places. He told me to stop going to those places.",
            "What do you call a sleeping dinosaur? A dino-snore.",
            "How many programmers does it take to change a light bulb? None, that's a hardware problem.",
            "Why did the computer go to the hospital? It had a virus!",
            "Why do we tell actors to 'break a leg'? Because every play has a cast.",
            "What kind of shoes do ninjas wear? Sneakers.",
            "Why did the smartphone get glasses? Because it lost all its contacts.",
            "What's blue and smells like red paint? Blue paint.",
            "Why was the belt arrested? For holding up a pair of pants!",
            "Where do waterfalls go to open a savings account? The river bank.",
            "Why did the student eat their homework? Because the teacher said it was a piece of cake.",
            "What do you call a line of people waiting to get haircuts? A barber-queue.",
            " How do you organize a space party? You planet!"
        ];

        function throwJoke() {
            
            let randomNum = Math.floor(Math.random() * list.length);
            document.getElementById('box').innerText = list[randomNum];
        }
    </script>

</body>
</html>
